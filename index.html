<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- FontAwesome -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
</head>

<body>

<h1>Calculator</h1>

<div class="calculator">

    <input type="text" id="ans" readonly>

    <div class="buttons">

        <button onclick="clearDisplay()">AC</button>
        <button onclick="deleteLast()"><i class="fa-solid fa-delete-left"></i></button>
        <button onclick="appendValue('%')">%</button>
        <button onclick="appendValue('/')">÷</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('*')">×</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('-')">−</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('+')">+</button>

        <button onclick="appendValue('0')" class="zero">0</button>
        <button onclick="appendValue('.')">.</button>
        <button onclick="calculate()" class="equal">=</button>

    </div>
</div>

<script>
    function appendValue(value) {
    document.getElementById("ans").value += value;
}

function clearDisplay() {
    document.getElementById("ans").value = "";
}

function deleteLast() {
    let current = document.getElementById("ans").value;
    document.getElementById("ans").value = current.slice(0, -1);
}

function calculate() {
    try {
        let expression = document.getElementById("ans").value;
        let result = eval(expression);
        document.getElementById("ans").value = result;
    } catch {
        document.getElementById("ans").value = "Error";
    }
}

// Keyboard support 🔥
document.addEventListener("keydown", function(e) {
    let key = e.key;

    if (!isNaN(key) || "+-*/.%".includes(key)) {
        appendValue(key);
    } else if (key === "Enter") {
        calculate();
    } else if (key === "Backspace") {
        deleteLast();
    }
});
</script>
</body>
</html>
